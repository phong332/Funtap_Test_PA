<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trang chính</title>
    <style>
        body {
            font-family: system-ui, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f6f8fa;
        }
        
        .container {
            display: flex;
            gap: 16px;
        }
        
        button {
            padding: 12px 18px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
        }
        
        button:hover {
            background: #f0f0f0;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .desc {
            font-size: 14px;
            color: #555;
            max-width: 320px;
            text-align: center;
        }
        
        @media (max-width: 680px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="btn-group">
            <button id="btn1" title="Mở FG38_PLA_v1_2_applovin">
         Mở FG38_PLA_v1_2_applovin
        </button>
            <div class="desc">V1_2</div>
        </div>

        <div class="btn-group">
            <button id="btn2" title="Mở FG38_PLA_v1_3_applovin">
          Mở FG38_PLA_v1_3_applovin
        </button>
            <div class="desc">V1_3</div>
        </div> 

         <div class="btn-group">
            <button id="btn3" title="Mở FG38_PLA_v1_5_applovin">
          Mở FG38_PLA_v1_5_applovin
        </button>
            <div class="desc">V1_5</div>
        </div> 
      </div>
    </div>
    <script>
        document.getElementById("btn1").addEventListener("click", function() {
            window.location.href = "FG38_PLA_v1_2_applovin.html";
        });
        document.getElementById("btn2").addEventListener("click", function() {
            window.location.href = "FG38_PLA_v1_3_applovin.html";
        });
        document.getElementById("btn3").addEventListener("click", function() {
            window.location.href = "FG38_PLA_v1_5_applovin.html";
        });
    </script>
</body>

</html>
